    .print-bar h2{font-size:.9rem;font-weight:700}
    .print-bar .right{display:flex;gap:.6rem}
    .btn-print{background:#f9b000;color:#000;border:none;border-radius:8px;

    .btn-back{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);

    .page-wrap{max-width:800px;margin:1.2rem auto;background:#fff;

    #noMatch{padding:2rem;text-align:center;color:#666;font-size:.95rem}

    /* ── PLANILLA ── */
    .planilla{padding:0}

    /* Header */
    .pl-header{background:#1a3a6b;color:#fff;padding:.7rem 1rem;
      display:flex;align-items:center;gap:.8rem}
    .pl-logo{width:44px;height:44px;background:rgba(255,255,255,.15);

      font-size:1.4rem;flex-shrink:0}
    .pl-header-text{}
    .pl-header-text h1{font-size:.95rem;font-weight:900;line-height:1.2}
    .pl-header-text p{font-size:.72rem;opacity:.8;margin-top:.15rem}

    /* Match info bar */
    .pl-info{display:grid;grid-template-columns:repeat(4,1fr) 2fr;
      border-bottom:2px solid #1a3a6b;font-size:.73rem}
    .pl-info-cell{padding:.35rem .55rem;border-right:1px solid #d0d8e4}
    .pl-info-cell:last-child{border-right:none}
    .pl-info-cell .lbl{font-weight:800;color:#1a3a6b;display:block;margin-bottom:.1rem;text-transform:uppercase;font-size:.65rem}
    .pl-info-cell .val{font-weight:600;color:#222}

    /* Teams score */
    .pl-teams{display:grid;grid-template-columns:1fr 120px 1fr;background:#f5f8fc}
    .pl-team{padding:.65rem .8rem;text-align:center}
    .pl-team-name{font-size:.92rem;font-weight:900;color:#1a3a6b;text-transform:uppercase}
    .pl-team-role{font-size:.65rem;color:#888;margin-bottom:.2rem;text-transform:uppercase;font-weight:700}
    .pl-score-box{display:flex;align-items:center;justify-content:center;gap:.3rem;padding:.5rem 0}
    .pl-score-cell{width:44px;height:44px;border:2px solid #1a3a6b;border-radius:6px;
      background:#fff;display:flex;align-items:center;justify-content:center;
      font-size:1.6rem;font-weight:900;color:#1a3a6b}
    .pl-score-sep{font-size:1.4rem;font-weight:900;color:#999}

    /* Quarter goals */
    .pl-quarters{border-top:1px solid #d0d8e4;border-bottom:1px solid #d0d8e4}
    .pl-quarters table{width:100%;border-collapse:collapse;font-size:.72rem}
    .pl-quarters th,.pl-quarters td{border:1px solid #d0d8e4;text-align:center;padding:.28rem .2rem}
    .pl-quarters th{background:#1a3a6b;color:#fff;font-weight:800;font-size:.65rem}
    .pl-quarters td.team-lbl{text-align:left;padding-left:.5rem;font-weight:700;
      color:#1a3a6b;background:#f0f4fa;width:90px}
    .pl-quarters td.score-cell{width:38px;background:#fff}

    /* Roster */
    .pl-roster{display:grid;grid-template-columns:1fr 4px 1fr}
    .roster-divider{background:#1a3a6b}
    .roster-side{font-size:.72rem}
    .roster-side-header{background:#1a3a6b;color:#fff;padding:.3rem .5rem;
      font-weight:800;font-size:.72rem;text-transform:uppercase;text-align:center}
    .roster-table{width:100%;border-collapse:collapse}
    .roster-table th{background:#eaf0f8;color:#1a3a6b;font-weight:800;
      border:1px solid #d0d8e4;padding:.25rem .2rem;text-align:center;font-size:.65rem}
    .roster-table th.name-col{text-align:left;padding-left:.35rem}
    .roster-table td{border:1px solid #e8edf3;padding:.22rem .2rem;
      text-align:center;height:16px;vertical-align:middle}
    .roster-table td.nro{font-weight:700;color:#1a3a6b;background:#f8fafc;font-size:.68rem}
    .roster-table td.name{text-align:left;padding-left:.35rem;font-size:.68rem;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
    .roster-table td.evt{width:20px;font-size:.65rem}
    .roster-table tr:nth-child(even){background:#fafbfc}
    .roster-table tr.empty-row td{background:#f5f8fc}

    /* Shootout */
    .pl-shootout{border-top:2px solid #1a3a6b;padding:.6rem .8rem}
    .pl-shootout h3{font-size:.78rem;font-weight:900;color:#1a3a6b;
      text-transform:uppercase;margin-bottom:.45rem;
      display:flex;align-items:center;gap:.4rem}
    .shootout-grid{display:grid;grid-template-columns:1fr 4px 1fr;gap:0}
    .shootout-divider{background:#1a3a6b}
    .shootout-side{}
    .shootout-side-title{font-size:.68rem;font-weight:800;color:#1a3a6b;
      text-transform:uppercase;padding:.2rem .4rem;background:#eaf0f8;
      border:1px solid #d0d8e4;text-align:center}
    .shootout-table{width:100%;border-collapse:collapse;font-size:.72rem}
    .shootout-table th{background:#eaf0f8;color:#1a3a6b;font-weight:800;
      border:1px solid #d0d8e4;padding:.25rem .35rem;text-align:center;font-size:.65rem}
    .shootout-table th.name-col{text-align:left}
    .shootout-table td{border:1px solid #e8edf3;padding:.22rem .3rem;height:22px;
      text-align:center;vertical-align:middle}
    .shootout-table td.order{background:#f8fafc;font-weight:700;color:#1a3a6b;
      font-size:.68rem;width:22px}
    .shootout-table td.name-td{text-align:left;font-size:.68rem}
    .shootout-table td.chk{width:28px}
    .chk-box{width:13px;height:13px;border:1.5px solid #555;display:inline-block;
      border-radius:2px;margin:0 auto}

    /* Officials */
    .pl-officials{border-top:1px solid #d0d8e4;padding:.5rem .8rem;
      display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;font-size:.72rem}
    .official-cell{}
    .official-cell .lbl{font-weight:800;color:#1a3a6b;font-size:.65rem;
      text-transform:uppercase;margin-bottom:.15rem}
    .official-cell .val{border-bottom:1px solid #aaa;padding-bottom:.15rem;
      min-height:18px;font-size:.72rem}

    /* Observaciones */
    .pl-obs{border-top:1px solid #d0d8e4;padding:.5rem .8rem}
    .pl-obs .lbl{font-weight:800;color:#1a3a6b;font-size:.65rem;text-transform:uppercase;margin-bottom:.3rem}
    .obs-box{border:1px solid #aaa;border-radius:4px;height:52px;width:100%}

    /* Signatures */
    .pl-sigs{border-top:1px solid #d0d8e4;padding:.55rem .8rem;
      display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;font-size:.72rem}
    .sig-cell{}
    .sig-line{border-bottom:1px solid #555;height:28px;margin-bottom:.2rem}
    .sig-label{font-size:.65rem;text-align:center;color:#555;font-weight:700;text-transform:uppercase}

    /* Footer */
    .pl-footer{background:#f5f8fc;padding:.3rem .8rem;text-align:center;
      font-size:.62rem;color:#999;border-top:1px solid #e0e6ee}

function chk(){ return `<div class="chk-box"></div>`; }

function rosterRows(teamName, minRows=22){
  const players = (TEAMS[teamName]||{}).players || [];
  const rows = [];
  players.forEach(p => {
    rows.push(`<tr>
      <td class="nro">${p.nro}</td>
      <td class="name">${p.a}, ${p.n}</td>
      <td class="evt">${chk()}</td>
      <td class="evt">${chk()}</td>
      <td class="evt"></td>
      <td class="evt"></td>
      <td class="evt"></td>
      <td class="evt"></td>
    </tr>`);
  });
  // blank extra rows
  const total = Math.max(minRows, players.length + 2);
  for(let i=players.length; i<total; i++){
    rows.push(`<tr class="empty-row">
      <td class="nro"></td><td class="name"></td>
      <td class="evt"></td><td class="evt"></td>
      <td class="evt"></td><td class="evt"></td>
      <td class="evt"></td><td class="evt"></td>
    </tr>`);
  }
  return rows.join('');
}

function shootoutRows(n=5){
  return Array.from({length:n},(_,i)=>`<tr>
    <td class="order">${i+1}</td>
    <td class="name-td"></td>
    <td class="chk">${chk()}</td>
    <td class="chk">${chk()}</td>
  </tr>`).join('');
}
