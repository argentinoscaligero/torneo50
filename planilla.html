<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Planilla de Partido · Máster +50 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary:#004b8d;--secondary:#0085c7;--accent:#f9b000;
      --bg:#f5f7fb;--card:#fff;--text:#222;--muted:#666;
      --green:#2e7d32;--yellow:#f57f17;--red:#c62828;
      --radius:16px;--shadow:0 6px 20px rgba(0,0,0,.07);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    a{color:inherit;text-decoration:none}

    /* ── HEADER ── */
    header{background:var(--primary);color:#fff;padding:.65rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;position:sticky;top:0;z-index:10}
    .hdr-left{display:flex;align-items:center;gap:.7rem}
    .hdr-left img{height:34px;border-radius:999px;background:#fff}
    .hdr-title{font-weight:800;font-size:.9rem}
    .hdr-sub{font-size:.72rem;opacity:.75}
    .hdr-right{display:flex;align-items:center;gap:.6rem}
    .hdr-team{font-size:.8rem;font-weight:700;opacity:.85}
    .btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.3rem .75rem;border-radius:999px;cursor:pointer;font-size:.8rem;font-weight:700}
    .btn-logout:hover{background:rgba(255,255,255,.25)}

    /* ── BUTTONS ── */
    .btn{border:none;border-radius:999px;cursor:pointer;font-weight:700;font-size:.88rem;padding:.55rem 1.1rem;transition:all .15s}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(0,75,141,.25)}
    .btn-primary:hover{background:var(--secondary)}
    .btn-secondary{background:rgba(0,75,141,.08);color:var(--primary)}
    .btn-secondary:hover{background:rgba(0,75,141,.15)}
    .btn-danger{background:rgba(198,40,40,.09);color:var(--red);border:1px solid rgba(198,40,40,.2)}
    .btn-danger:hover{background:rgba(198,40,40,.16)}
    .btn-sm{padding:.32rem .7rem;font-size:.78rem}
    .btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:10px}
    .btn-full{width:100%}

    /* ── LAYOUT ── */
    main{max-width:860px;margin:0 auto;padding:1.2rem;padding-bottom:3rem}
    .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)}

    /* ── MSGS ── */
    .msg{padding:.55rem .9rem;border-radius:10px;font-size:.83rem;margin-top:.6rem;display:none}
    .msg.error{background:rgba(200,0,0,.07);color:#c00;border:1px solid rgba(200,0,0,.15);display:block}
    .msg.ok{background:rgba(0,160,70,.07);color:#006020;border:1px solid rgba(0,160,70,.15);display:block}
    .msg.warn{background:rgba(245,127,23,.1);color:#8a5000;border:1px solid rgba(245,127,23,.2);display:block}

    /* ── LOGIN ── */
    #loginScreen{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .login-card{background:var(--card);border-radius:20px;padding:2rem;box-shadow:var(--shadow);width:100%;max-width:400px}
    .login-card h2{color:var(--primary);font-size:1.15rem;margin-bottom:1.1rem}
    .field{display:grid;gap:.22rem;margin-bottom:.8rem}
    label{font-size:.78rem;font-weight:800;color:var(--primary)}
    input,select{width:100%;border-radius:10px;border:1px solid rgba(0,0,0,.1);padding:.58rem .75rem;font-size:.92rem;outline:none;background:#fff;transition:border-color .15s,box-shadow .15s}
    input:focus,select:focus{border-color:rgba(0,133,199,.5);box-shadow:0 0 0 3px rgba(0,133,199,.12)}

    /* ── APP ── */
    #appScreen{display:none}
    .welcome{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border-radius:var(--radius);padding:1rem 1.3rem;margin-bottom:1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem}
    .welcome-name{font-size:1.1rem;font-weight:800}
    .welcome-group{font-size:.82rem;opacity:.8;margin-top:.1rem}

    /* Fecha tabs */
    .tabs{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1rem}
    .tab-btn{border:1px solid rgba(0,0,0,.08);background:#fff;color:var(--primary);font-weight:700;padding:.38rem .8rem;border-radius:999px;cursor:pointer;font-size:.83rem;box-shadow:var(--shadow);transition:all .15s}
    .tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .tab-btn:disabled{opacity:.4;cursor:not-allowed}

    /* Match list */
    .match-list{display:grid;gap:.75rem}
    .match-item{background:var(--card);border-radius:var(--radius);padding:.9rem 1.1rem;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;cursor:pointer;border-left:4px solid transparent;transition:transform .15s,box-shadow .15s}
    .match-item:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.1)}
    .match-item.phase-pre{border-color:rgba(0,0,0,.1)}
    .match-item.phase-lineup{border-color:var(--accent)}
    .match-item.phase-partido-live{border-color:var(--red)}
    .match-item.phase-partido-post{border-color:var(--secondary)}
    .match-item.phase-done{border-color:var(--green)}
    .mi-teams{font-weight:800;font-size:.95rem}
    .mi-vs{font-size:.75rem;color:var(--muted);background:rgba(0,0,0,.05);padding:.1rem .4rem;border-radius:999px;margin:0 .35rem}
    .mi-meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.3rem}
    .mp{background:rgba(0,75,141,.07);color:var(--primary);padding:.14rem .45rem;border-radius:999px;font-size:.75rem;font-weight:700}
    .mp.sede{background:rgba(249,176,0,.15);color:#8a6000}
    .phase-badge{font-size:.73rem;font-weight:800;padding:.18rem .5rem;border-radius:999px}
    .pb-pre{background:rgba(0,0,0,.05);color:var(--muted)}
    .pb-lineup{background:rgba(249,176,0,.2);color:#8a6000}
    .pb-live{background:rgba(198,40,40,.1);color:var(--red)}
    .pb-post{background:rgba(0,133,199,.1);color:var(--secondary)}
    .pb-done{background:rgba(46,125,50,.1);color:var(--green)}
    .mi-score{font-weight:900;font-size:1rem;color:var(--primary);background:rgba(0,75,141,.07);padding:.2rem .6rem;border-radius:10px;min-width:54px;text-align:center}

    /* ── MATCH DETAIL PANEL (full screen) ── */
    #detailPanel{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;display:none}
    #detailPanel.open{display:block}
    .dp-header{background:var(--primary);color:#fff;padding:.65rem 1.1rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:5}
    .dp-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.3rem .75rem;border-radius:999px;cursor:pointer;font-size:.8rem;font-weight:700;flex-shrink:0}
    .dp-info{flex:1;min-width:0}
    .dp-title{font-weight:800;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dp-group{font-size:.72rem;opacity:.75}
    .dp-score{font-size:1.5rem;font-weight:900;background:rgba(255,255,255,.15);padding:.18rem .65rem;border-radius:10px;letter-spacing:.05em;flex-shrink:0;min-width:70px;text-align:center}
    .dp-body{max-width:780px;margin:0 auto;padding:1.1rem}

    /* Section blocks */
    .section{background:var(--card);border-radius:var(--radius);padding:1.1rem;box-shadow:var(--shadow);margin-bottom:.9rem}
    .sec-title{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--primary);margin-bottom:.75rem;padding-bottom:.35rem;border-bottom:2px solid rgba(0,75,141,.1)}

    /* ── PHASE: FORMATION ── */
    .player-scroll{max-height:280px;overflow-y:auto;border:1px solid rgba(0,0,0,.07);border-radius:10px}
    .prow{display:grid;grid-template-columns:28px 1fr auto auto;align-items:center;gap:.3rem;padding:.38rem .55rem;border-bottom:1px solid rgba(0,0,0,.04);font-size:.82rem}
    .prow:last-child{border-bottom:none}
    .prow:hover{background:rgba(0,75,141,.04)}
    .prow .nro{color:var(--muted);font-size:.72rem;font-weight:700;text-align:right}
    .prow .pname{font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .prow .chk-lbl{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;padding:0 .3rem}
    .prow .chk-lbl span{font-size:.6rem;font-weight:800;color:var(--muted);text-transform:uppercase}
    .prow .chk-lbl input{accent-color:var(--primary);cursor:pointer;width:15px;height:15px}
    .form-header{display:grid;grid-template-columns:28px 1fr auto auto;gap:.3rem;padding:.28rem .55rem;font-size:.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid rgba(0,75,141,.1)}
    .form-header .fh-ts{text-align:center;padding:0 .3rem}
    .no-players{color:var(--muted);font-size:.82rem;font-style:italic;padding:.7rem .55rem}
    .form-count{font-size:.73rem;color:var(--muted);margin-top:.4rem}

    /* ── PHASE: MODE SELECT ── */
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
    .mode-card{border:2px solid rgba(0,75,141,.12);background:#fff;border-radius:14px;padding:1.3rem;cursor:pointer;text-align:center;transition:all .15s}
    .mode-card:hover{border-color:var(--primary);background:rgba(0,75,141,.03);transform:translateY(-2px)}
    .mode-icon{font-size:2.2rem;margin-bottom:.4rem}
    .mode-name{font-weight:800;color:var(--primary);font-size:.95rem}
    .mode-desc{font-size:.75rem;color:var(--muted);margin-top:.25rem;line-height:1.4}

    /* ── TIMER ── */
    .timer-wrap{text-align:center;padding:.5rem 0}
    .quarter-dots{font-size:1.1rem;color:var(--primary);letter-spacing:.35em;margin-bottom:.2rem}
    .quarter-lbl{font-size:.77rem;font-weight:700;color:var(--muted);margin-bottom:.6rem}
    .timer-display{font-size:3.8rem;font-weight:900;color:var(--primary);font-variant-numeric:tabular-nums;line-height:1;margin-bottom:.75rem;transition:color .3s}
    .timer-display.live{color:var(--red)}
    .timer-btns{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap}

    /* ── QUICK EVENT ── */
    .qe-wrap{display:grid;gap:.7rem}
    .team-toggle{display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(0,75,141,.15);border-radius:10px;overflow:hidden}
    .team-toggle button{border:none;background:#fff;padding:.5rem;cursor:pointer;font-weight:700;font-size:.8rem;color:var(--muted);transition:all .15s}
    .team-toggle button.active{background:var(--primary);color:#fff}
    .qe-player{width:100%;border-radius:10px;border:1px solid rgba(0,0,0,.1);padding:.5rem .7rem;font-size:.85rem;background:#fff}
    .ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem}
    .ev-btn{border:1px solid rgba(0,0,0,.08);background:#fff;border-radius:12px;padding:.55rem .3rem;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:all .15s}
    .ev-btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,.1)}
    .ev-btn:active{transform:translateY(0)}
    .ev-icon{font-size:1.35rem;display:block;margin-bottom:.1rem}
    .ev-label{font-size:.7rem;font-weight:700;color:var(--primary)}

    /* ── POST MODE SCORE INPUT ── */
    .score-row{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
    .score-block{flex:1;min-width:110px;text-align:center}
    .score-block label{display:block;font-size:.78rem;font-weight:800;color:var(--muted);margin-bottom:.4rem}
    .score-input{width:82px;font-size:2.2rem;font-weight:900;text-align:center;border-radius:12px;border:2px solid rgba(0,75,141,.2);padding:.3rem;color:var(--primary);display:block;margin:0 auto}
    .score-sep{font-size:1.8rem;font-weight:900;color:var(--muted);flex-shrink:0}
    .shoot-row{display:flex;align-items:center;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted)}
    .shoot-inp{width:52px;font-size:1.1rem;font-weight:800;text-align:center;border-radius:8px;border:1px solid rgba(0,0,0,.1);padding:.25rem;color:var(--primary)}
    .post-event-form{display:grid;grid-template-columns:58px 1fr 1fr auto;gap:.45rem;align-items:end;margin-top:.6rem}
    .post-event-form label{font-size:.72rem;font-weight:800;color:var(--primary)}
    .post-event-form select,.post-event-form input{font-size:.82rem;border-radius:9px;border:1px solid rgba(0,0,0,.1);padding:.42rem .55rem;background:#fff}

    /* ── EVENTS LOG ── */
    .events-log{display:grid;gap:.3rem;max-height:220px;overflow-y:auto}
    .ev-row{display:flex;align-items:center;gap:.45rem;padding:.32rem .5rem;border-radius:9px;background:rgba(0,0,0,.025);font-size:.8rem}
    .ev-min{font-weight:900;color:var(--primary);min-width:34px;font-size:.77rem}
    .ev-det{flex:1;min-width:0}
    .ev-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.9rem;padding:0 .15rem;flex-shrink:0}
    .ev-del:hover{color:var(--red)}
    .no-events{color:var(--muted);font-size:.82rem;font-style:italic;padding:.3rem 0}

    /* ── DONE ── */
    .done-summary{text-align:center;padding:1rem 0}
    .done-score{font-size:2.8rem;font-weight:900;color:var(--primary);margin:.4rem 0}
    .done-teams{font-size:.9rem;color:var(--muted)}

    @media(max-width:520px){
      .formation-grid,.mode-grid{grid-template-columns:1fr}
      .ev-grid{grid-template-columns:repeat(3,1fr)}
      .post-event-form{grid-template-columns:50px 1fr}
      .timer-display{font-size:3rem}
      .dp-score{font-size:1.2rem}
    }
  </style>
</head>

</div>

<!-- APP -->

    <div class="tabs" id="fechaTabs"></div>
    <div id="matchList"></div>
  </main>
</div>

async function api(method, path, body){
  const opts = { method, headers:{ Authorization:'Bearer '+S.token } };

// ═══════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════
const T = {
  quarter:1, running:false,
  elapsedAtPause:0, startedAt:null,
  interval:null, MAX:900
};

const elapsed = () => !T.running ? T.elapsedAtPause
  : T.elapsedAtPause + Math.floor((Date.now()-T.startedAt)/1000);

const fmtSec = s => {
  s = Math.min(s, T.MAX);
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
};

function startTimer(){
  if(T.running) return;
  T.startedAt = Date.now();
  T.running = true;
  T.interval = setInterval(()=>{
    updateTimerUI();
    if(elapsed() >= T.MAX){ pauseTimer(); updateTimerUI(); }
  }, 500);
  updateTimerUI();
  saveTimer();
}
function pauseTimer(){
  if(!T.running) return;
  T.elapsedAtPause = Math.min(elapsed(), T.MAX);
  T.running=false; T.startedAt=null;
  clearInterval(T.interval); T.interval=null;
  saveTimer();
}
function nextQuarter(){
  T.quarter++; T.elapsedAtPause=0; T.startedAt=null; T.running=false;
  updateTimerUI(); saveTimer();
}
function endQuarterManual(){
  pauseTimer(); T.elapsedAtPause=T.MAX; updateTimerUI(); saveTimer();
}
function resetTimer(){
  pauseTimer(); T.quarter=1; T.elapsedAtPause=0; T.startedAt=null;
}
function saveTimer(){
  if(!S.currentId) return;
  sessionStorage.setItem('tmr_'+S.currentId, JSON.stringify({
    quarter:T.quarter, elapsedAtPause:T.elapsedAtPause,
    startedAt: T.running ? T.startedAt : null
  }));
}
function loadTimer(id){
  const d = JSON.parse(sessionStorage.getItem('tmr_'+id)||'null');
  if(!d){ T.quarter=1; T.elapsedAtPause=0; T.startedAt=null; T.running=false; return; }
  T.quarter=d.quarter||1;
  T.elapsedAtPause=d.elapsedAtPause||0;
  T.running=false; T.startedAt=null;
  if(d.startedAt){
    const extra=Math.floor((Date.now()-d.startedAt)/1000);
    T.elapsedAtPause=Math.min(T.elapsedAtPause+extra, T.MAX);
  }
}
function updateTimerUI(){
  const el=document.getElementById('timerDisplay'); if(!el)return;
  const e=elapsed();
  el.textContent=fmtSec(e);
  el.className='timer-display'+(T.running?' live':'');
  const ql=document.getElementById('quarterLbl');
  if(ql){
    const dots=[1,2,3,4].map(q=>q<T.quarter?'●':q===T.quarter?'◉':'○').join(' ');
    ql.textContent=`${dots}   ${T.quarter}° Tiempo`;
  }
  renderTimerBtns();
}
function renderTimerBtns(){
  const el=document.getElementById('timerBtns'); if(!el)return;
  const e=elapsed(), atEnd=e>=T.MAX;
  if(T.quarter>4){
    el.innerHTML=`<span style="color:var(--green);font-weight:700;font-size:.85rem">✅ 4° tiempo completado — usá el botón "Cerrar partido" más abajo</span>`;
    return;
  }
  if(atEnd && !T.running){
    el.innerHTML = T.quarter<4
      ? `<span style="color:var(--muted);font-size:.82rem">Fin del ${T.quarter}° tiempo</span>
         <button class="btn btn-primary" onclick="nextQuarter()">▶ Iniciar ${T.quarter+1}° tiempo</button>`
      : `<span style="color:var(--green);font-weight:700;font-size:.85rem">✅ 4° tiempo completado — usá el botón "Cerrar partido" más abajo</span>`;
    return;
  }
  if(T.running){
    el.innerHTML=`<button class="btn btn-secondary" onclick="pauseTimer()">⏸ Pausar</button>
      <button class="btn btn-danger" onclick="endQuarterManual()">⏹ Fin ${T.quarter}° tiempo</button>`;
  } else {
    const lbl=T.elapsedAtPause>0?'▶ Reanudar':`▶ Iniciar ${T.quarter}° tiempo`;
    el.innerHTML=`<button class="btn btn-primary" onclick="startTimer()">${lbl}</button>`;
  }
}

async function doLogin(){
  const team=document.getElementById('lTeam').value;
  const pass=document.getElementById('lPass').value;
  const msg=document.getElementById('loginMsg');
  msg.className='msg';
  if(!team){msg.className='msg error';msg.textContent='Seleccioná tu equipo.';return;}
  if(!pass){msg.className='msg error';msg.textContent='Ingresá la contraseña.';return;}
  try{
    const d=await api('POST','/api/login',{team,password:pass});
    if(d.token){
      S.token=d.token; S.team=d.team; S.group=d.group; S.isAdmin=d.group==='ADMIN';
      sessionStorage.setItem('tm50_token',d.token);
      sessionStorage.setItem('tm50_team',d.team);
      sessionStorage.setItem('tm50_group',d.group);
      await enterApp();
    } else {
      msg.className='msg error'; msg.textContent=d.error||'Credenciales incorrectas.';
    }
  }catch(e){
    msg.className='msg error';
    msg.textContent='⚠️ No se puede conectar al servidor. Verificá que el backend esté corriendo.';
  }
}
function logout(){
  sessionStorage.clear(); resetTimer();
  S.token=S.team=S.group=null; S.isAdmin=false; S.matches={};
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('lPass').value='';
}
async function enterApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  document.getElementById('hdrTeam').textContent=S.team;
  document.getElementById('welcomeName').textContent=S.isAdmin?'👑 Administrador':S.team;
  document.getElementById('welcomeGroup').textContent=S.isAdmin?'Acceso completo':`Grupo ${S.group}`;
  await loadMatches();
  renderFechaTabs();
  renderMatchList();
}

async function loadMatches(){

}

function renderFechaTabs(){
  const fechas=[...new Set(Object.values(S.matches).map(m=>m.fecha))].sort();
  document.getElementById('fechaTabs').innerHTML=fechas.map(f=>{
    const locked = f>FECHA_ACTIVA && !S.isAdmin;
    return `<button class="tab-btn ${f===S.currentFecha?'active':''}"
      onclick="${locked?'':` setFecha(${f},this)`}"
      ${locked?`disabled title="Se habilita al llegar la fecha"`:''}
      style="${locked?'opacity:.4;cursor:not-allowed':''}">
      Fecha ${f}${locked?' 🔒':''}
    </button>`;
  }).join('');
}

function setFecha(n,btn){
  S.currentFecha=n;
  document.querySelectorAll('#fechaTabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMatchList();
}

function phaseBadge(m){
  if(m.phase==='done')         return `<span class="phase-badge pb-done">✅ Finalizado</span>`;
  if(m.phase==='partido')      return m.mode==='live'
    ? `<span class="phase-badge pb-live">🔴 En vivo</span>`
    : `<span class="phase-badge pb-post">📊 Completando</span>`;
  if(m.phase==='lineup_sent')  return `<span class="phase-badge pb-lineup">📋 Formación enviada</span>`;
  return `<span class="phase-badge pb-pre">📝 Sin iniciar</span>`;
}
function phaseClass(m){
  if(m.phase==='done') return 'phase-done';
  if(m.phase==='partido') return m.mode==='live'?'phase-partido-live':'phase-partido-post';
  if(m.phase==='lineup_sent') return 'phase-lineup';
  return 'phase-pre';
}

function renderMatchList(){
  const items=Object.entries(S.matches)
    .filter(([,m])=>m.fecha===S.currentFecha)
    .filter(([,m])=>S.isAdmin||m.home===S.team||m.away===S.team)
    .sort(([,a],[,b])=>a.group.localeCompare(b.group)||(a.horario||'').localeCompare(b.horario||''));

  if(!items.length){
    document.getElementById('matchList').innerHTML=
      `<div class="card" style="padding:1.5rem;text-align:center;color:var(--muted)">No hay partidos para esta fecha.</div>`;
    return;
  }

  document.getElementById('matchList').innerHTML=`<div class="match-list">`+items.map(([id,m])=>{
    const hasScore=m.scoreH!==null&&m.scoreA!==null;
    return `<div class="match-item ${phaseClass(m)}" onclick="openDetail('${id}')">
      <div>
        <div class="mi-teams">${m.home}<span class="mi-vs">vs</span>${m.away}</div>
        <div class="mi-meta" style="margin-top:.3rem">
          <span class="mp">Grupo ${m.group}</span>
          ${m.sede?`<span class="mp sede">📍 ${m.sede}</span>`:''}
          ${m.horario?`<span class="mp">🕐 ${m.horario}</span>`:''}
          ${phaseBadge(m)}
        </div>
      </div>
      ${hasScore?`<div class="mi-score">${m.scoreH} – ${m.scoreA}</div>`:''}
    </div>`;
  }).join('')+'</div>';
}

function openDetail(id){
  S.currentId=id;
  const m=S.matches[id];
  loadTimer(id);
  document.getElementById('dpTitle').textContent=`${m.home} vs ${m.away}`;
  document.getElementById('dpGroup').textContent=`Grupo ${m.group}${m.sede?' · '+m.sede:''}${m.horario?' · '+m.horario:''}`;
  updateScoreHeader();
  renderDetail();
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailPanel').scrollTop=0;
}
function closeDetail(){
  pauseTimer();
  document.getElementById('detailPanel').classList.remove('open');
  S.currentId=null;
  renderMatchList();
}
function updateScoreHeader(){
  const m=S.matches[S.currentId];
  if(!m) return;
  const h=m.scoreH, a=m.scoreA;
  document.getElementById('dpScore').textContent=(h!==null&&a!==null)?`${h} – ${a}`:'– –';
}
function renderDetail(){
  const m=S.matches[S.currentId];
  const phase=m.phase||'pre';
  let html='';

  if(phase==='done'){
    html+=renderDoneSection(m);
  } else {
    html+=renderFormationSection(m);
    if(phase==='pre'||phase==='lineup_sent'){
      html+=renderModeSelect(m, phase);
    } else if(phase==='partido'){
      if(m.mode==='live') html+=renderLiveSection(m);
      else html+=renderPostSection(m);
    }
    html+=renderEventsSection(m, phase);
    html+=renderCloseSection(m);
  }

  document.getElementById('dpBody').innerHTML=html;
  if(m.mode==='live' && phase==='partido') updateTimerUI();
}

        <div class="fh-ts">S</div>

  const opponentOk = side==='home' ? !!m.lineup_away_ok : !!m.lineup_home_ok;

        ${opponentOk?'✅':'⏳'} ${opponentName}: ${opponentOk?'enviada':'pendiente'}

async function submitLineup(){
  const m=S.matches[S.currentId];
  const side=m.home===S.team?'home':(m.away===S.team?'away':'home');
  const titulares=[...document.querySelectorAll('.chk-tit:checked')].map(c=>c.dataset.key);
  const suplentes=[...document.querySelectorAll('.chk-sup:checked')].map(c=>c.dataset.key);
  const msg=document.getElementById('lineupMsg');
  try{
    const d=await api('POST',`/api/matches/${S.currentId}/lineup`,{side,titulares,suplentes});
    if(d.ok){
      S.matches[S.currentId]=d.match;
      msg.className='msg ok'; msg.textContent='✅ Formación guardada';
      setTimeout(()=>{msg.className='msg';},2000);
      renderDetail();
    }else{ msg.className='msg error'; msg.textContent=d.error||'Error'; }
  }catch(e){ msg.className='msg error'; msg.textContent='Error de conexión'; }
}

// ── MODE SELECT ──
function renderModeSelect(m, phase){
  const ready = phase==='lineup_sent';
  const subtitle = ready
    ? 'Formación enviada. Elegí cómo registrar el partido.'
    : 'Podés enviar la formación antes o ir directo al partido.';
  return `<div class="section">
    <div class="sec-title">⚽ Modo partido</div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:.9rem">${subtitle}</p>
    <div class="mode-grid">
      <div class="mode-card" onclick="startMode('live')">
        <div class="mode-icon">🔴</div>
        <div class="mode-name">En vivo</div>
        <div class="mode-desc">Cronómetro por tiempos. Cargás los eventos mientras se juega.</div>
      </div>
      <div class="mode-card" onclick="startMode('post')">
        <div class="mode-icon">📝</div>
        <div class="mode-name">Completar datos</div>
        <div class="mode-desc">Cargás el resultado y los eventos después del partido.</div>
      </div>
    </div>
  </div>`;
}

async function startMode(mode){
  const d=await api('POST',`/api/matches/${S.currentId}/phase`,{phase:'partido',mode});
  if(d.ok){ S.matches[S.currentId]=d.match; renderDetail(); }
}

// ── LIVE ──
function renderLiveSection(m){
  S.liveTeamSide = S.team===m.home||S.isAdmin?'home':'away';
  const teamHome=m.home, teamAway=m.away;
  const playerOpts=side=>{
    const pl=PLAYERS[side==='home'?teamHome:teamAway]||[];
    return `<option value="">— Jugadora —</option>`
      +pl.map(p=>`<option>${p.nro!=='—'?'#'+p.nro+' ':''}${p.a} ${p.n}</option>`).join('');
  };

  return `<div class="section">
    <div class="sec-title">🔴 En vivo</div>

    <div class="timer-wrap">
      <div class="quarter-dots" id="quarterLbl">○ ○ ○ ○   1° Tiempo</div>
      <div class="timer-display" id="timerDisplay">00:00</div>
      <div class="timer-btns" id="timerBtns"></div>
    </div>

    <div style="margin-top:1.1rem;padding-top:.9rem;border-top:1px solid rgba(0,0,0,.06)">
      <div class="sec-title" style="margin-bottom:.6rem">Registrar evento</div>
      <div class="qe-wrap">
        <div class="team-toggle">
          <button id="btnHome" class="${S.liveTeamSide==='home'?'active':''}"
            onclick="setLiveSide('home')">${teamHome}</button>
          <button id="btnAway" class="${S.liveTeamSide==='away'?'active':''}"
            onclick="setLiveSide('away')">${teamAway}</button>
        </div>
        <select class="qe-player" id="qePlayer" onchange="S.livePlayer=this.value">
          ${playerOpts(S.liveTeamSide)}
        </select>
        <div class="ev-grid">
          ${EV_TYPES.map(t=>`
            <button class="ev-btn" onclick="addLiveEvent('${t.v}')">
              <span class="ev-icon">${t.icon}</span>
              <span class="ev-label">${t.label}</span>
            </button>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function setLiveSide(side){
  S.liveTeamSide=side;
  const m=S.matches[S.currentId];
  document.getElementById('btnHome').className=side==='home'?'active':'';
  document.getElementById('btnAway').className=side==='away'?'active':'';
  const teamName=side==='home'?m.home:m.away;
  const pl=PLAYERS[teamName]||[];
  const sel=document.getElementById('qePlayer');
  sel.innerHTML=`<option value="">— Jugadora —</option>`
    +pl.map(p=>`<option>${p.nro!=='—'?'#'+p.nro+' ':''}${p.a} ${p.n}</option>`).join('');
  S.livePlayer='';
}

async function addLiveEvent(type){
  const m=S.matches[S.currentId];
  const team=S.liveTeamSide==='home'?m.home:m.away;
  const player=document.getElementById('qePlayer')?.value||'';
  const e=elapsed();
  const minInQuarter=Math.ceil(e/60)||1;
  const minuto=(T.quarter-1)*15+minInQuarter;
  try{
    const d=await api('POST',`/api/matches/${S.currentId}/event`,
      {type,team,player,minuto,quarter:T.quarter});
    if(d.ok){
      if(!m.events) m.events=[];
      m.events.push(d.event);
      m.scoreH=d.scoreH; m.scoreA=d.scoreA;
      updateScoreHeader();
      refreshEventsLog();
    }
  }catch(e){ console.error(e); }
}

// confirmFinish ya no se usa — el cierre pasa por closeMatch()

// ── POST MODE ──
function renderPostSection(m){
  const h=m.scoreH??'', a=m.scoreA??'';
  const sh=m.shootoutH??'', sa=m.shootoutA??'';
  const playerOpts=teamName=>{
    const pl=PLAYERS[teamName]||[];
    return `<option value="">— Jugadora —</option>`
      +pl.map(p=>`<option data-team="${teamName}">${p.nro!=='—'?'#'+p.nro+' ':''}${p.a} ${p.n}</option>`).join('');
  };
  return `<div class="section">
    <div class="sec-title">📝 Completar datos</div>
    <div class="score-row">
      <div class="score-block">
        <label>${m.home}</label>
        <input class="score-input" type="number" id="postH" min="0" max="99" value="${h}" />
      </div>
      <div class="score-sep">–</div>
      <div class="score-block">
        <label>${m.away}</label>
        <input class="score-input" type="number" id="postA" min="0" max="99" value="${a}" />
      </div>
    </div>
    <div class="shoot-row">
      <span>Shootouts:</span>
      <input class="shoot-inp" type="number" id="postSH" min="0" max="10" value="${sh}" placeholder="—" />
      <span>–</span>
      <input class="shoot-inp" type="number" id="postSA" min="0" max="10" value="${sa}" placeholder="—" />
      <span style="font-size:.72rem">(opcional)</span>
    </div>

    <div style="margin-top:.9rem;padding-top:.8rem;border-top:1px solid rgba(0,0,0,.06)">
      <div class="sec-title" style="margin-bottom:.5rem">Agregar evento</div>
      <div class="post-event-form">
        <div><label>Min.</label><input type="number" id="pMin" min="1" max="60" value="1" /></div>
        <div><label>Tipo</label>
          <select id="pType">${EV_TYPES.map(t=>`<option value="${t.v}">${t.icon} ${t.label}</option>`).join('')}</select>
        </div>
        <div><label>Equipo y jugadora</label>
          <select id="pPlayer" style="width:100%">
            <optgroup label="${m.home}">${playerOpts(m.home)}</optgroup>
            <optgroup label="${m.away}">${playerOpts(m.away)}</optgroup>
          </select>
        </div>
        <div><label>&nbsp;</label><button class="btn btn-primary btn-sm" onclick="addPostEvent()">+ Agregar</button></div>
      </div>
    </div>
  </div>`;
}

async function addPostEvent(){
  const m=S.matches[S.currentId];
  const min=parseInt(document.getElementById('pMin')?.value)||1;
  const type=document.getElementById('pType')?.value;
  const sel=document.getElementById('pPlayer');
  const opt=sel?.options[sel.selectedIndex];
  const team=opt?.dataset?.team||opt?.parentElement?.label||m.home;
  const player=opt?.value||'';
  try{
    const d=await api('POST',`/api/matches/${S.currentId}/event`,
      {type,team,player,minuto:min,quarter:Math.ceil(min/15)||1});
    if(d.ok){
      if(!m.events) m.events=[];
      m.events.push(d.event);
      m.scoreH=d.scoreH; m.scoreA=d.scoreA;
      updateScoreHeader();
      refreshEventsLog();
    }
  }catch(e){ console.error(e); }
}

// ── CERRAR PARTIDO ──
function renderCloseSection(m){
  const homeOk = !!m.lineup_home_ok;
  const awayOk = !!m.lineup_away_ok;
  const canClose = homeOk && awayOk;

  const dot = ok => ok
    ? `<span style="color:var(--green);font-weight:700">✅</span>`
    : `<span style="color:var(--muted)">⏳</span>`;

  return `<div class="section" style="border:2px solid ${canClose?'rgba(46,125,50,.25)':'rgba(0,0,0,.07)'}">
    <div class="sec-title">🏁 Cerrar partido</div>
    <div style="display:flex;gap:1.2rem;flex-wrap:wrap;font-size:.82rem;margin-bottom:.65rem">
      <span>${dot(homeOk)} ${m.home}: ${homeOk?'<strong>formación enviada</strong>':'pendiente'}</span>
      <span>${dot(awayOk)} ${m.away}: ${awayOk?'<strong>formación enviada</strong>':'pendiente'}</span>
    </div>
    ${canClose
      ? `<p style="font-size:.8rem;color:var(--muted);margin-bottom:.7rem">
           Ambas formaciones confirmadas. Cualquier equipo puede cerrar el partido.
         </p>
         <button class="btn btn-primary" onclick="closeMatch()" style="background:var(--green)">🏁 Cerrar partido</button>
         <span id="closeMsg" class="msg" style="display:inline-block;margin-left:.5rem;padding:.3rem .7rem"></span>`
      : `<p style="font-size:.8rem;color:var(--muted)">
           Ambos equipos deben guardar su formación antes de poder cerrar el partido.
         </p>`
    }
  </div>`;
}

async function closeMatch(){
  const m = S.matches[S.currentId];
  const msg = document.getElementById('closeMsg');

  let scoreH = m.scoreH ?? 0, scoreA = m.scoreA ?? 0;
  let shootoutH = m.shootoutH ?? null, shootoutA = m.shootoutA ?? null;

  // En modo post, leer resultado de los inputs
  if(m.mode === 'post'){
    const h = parseInt(document.getElementById('postH')?.value);
    const a = parseInt(document.getElementById('postA')?.value);
    if(isNaN(h) || isNaN(a)){
      if(msg){ msg.className='msg error'; msg.textContent='Ingresá el resultado antes de cerrar.'; }
      return;
    }
    scoreH = h; scoreA = a;
    shootoutH = parseInt(document.getElementById('postSH')?.value) || null;
    shootoutA = parseInt(document.getElementById('postSA')?.value) || null;
  }

  try{
    const d = await api('POST', `/api/matches/${S.currentId}/phase`,
      {phase:'done', scoreH, scoreA, shootoutH, shootoutA});
    if(d.ok){ S.matches[S.currentId]=d.match; resetTimer(); renderDetail(); }
    else if(msg){ msg.className='msg error'; msg.textContent=d.error||'Error'; }
  }catch(e){
    if(msg){ msg.className='msg error'; msg.textContent='Error de conexión'; }
  }
}

// ── DONE ──
function renderDoneSection(m){
  return `<div class="section">
    <div class="sec-title">✅ Partido finalizado</div>
    <div class="done-summary">
      <div class="done-teams">${m.home}</div>
      <div class="done-score">${m.scoreH} – ${m.scoreA}</div>
      <div class="done-teams">${m.away}</div>
      ${m.shootoutH!==null&&m.shootoutH!==undefined
        ?`<div style="margin-top:.4rem;font-size:.82rem;color:var(--muted)">Shootouts: ${m.shootoutH} – ${m.shootoutA}</div>`:''}
      <div style="margin-top:.5rem;font-size:.75rem;color:var(--muted)">
        Enviado el ${m.submitted_at?new Date(m.submitted_at).toLocaleString('es-AR'):'—'}
      </div>
    </div>
  </div>`;
}

// ── EVENTS ──
const EV_ICONS = {gol:'⚽',pc:'🔵',ps:'🟠',amarilla:'🟡',roja:'🔴',verde:'🟢'};

function renderEventsSection(m, phase){
  const evs=(m.events||[]);
  const readonly=phase==='done';
  const listHtml=evs.length
    ? evs.map(ev=>`
        <div class="ev-row">
          <span class="ev-min">${EV_ICONS[ev.type]||'❓'} ${ev.quarter?ev.quarter+'T·':''}${ev.minuto}'</span>
          <div class="ev-det"><strong>${ev.team}</strong> · ${ev.player||'—'}</div>
          ${!readonly?`<button class="ev-del" onclick="delEvent('${ev.id}')">✕</button>`:''}
        </div>`).join('')
    : `<div class="no-events">Sin eventos registrados.</div>`;

  return `<div class="section">
    <div class="sec-title">📋 Eventos del partido (${evs.length})</div>
    <div class="events-log" id="evLog">${listHtml}</div>
  </div>`;
}

function refreshEventsLog(){
  const m=S.matches[S.currentId];
  if(!m) return;
  const el=document.getElementById('evLog'); if(!el) return;
  const readonly=m.phase==='done';
  const evs=m.events||[];
  el.innerHTML=evs.length
    ? evs.map(ev=>`
        <div class="ev-row">
          <span class="ev-min">${EV_ICONS[ev.type]||'❓'} ${ev.quarter?ev.quarter+'T·':''}${ev.minuto}'</span>
          <div class="ev-det"><strong>${ev.team}</strong> · ${ev.player||'—'}</div>
          ${!readonly?`<button class="ev-del" onclick="delEvent('${ev.id}')">✕</button>`:''}
        </div>`).join('')
    : `<div class="no-events">Sin eventos registrados.</div>`;
}

async function delEvent(eid){
  const m=S.matches[S.currentId];
  try{
    const d=await api('DELETE',`/api/matches/${S.currentId}/event/${eid}`);
    if(d.ok){
      m.events=(m.events||[]).filter(e=>e.id!==eid);
      m.scoreH=d.scoreH; m.scoreA=d.scoreA;
      updateScoreHeader();
      refreshEventsLog();
    }
  }catch(e){ console.error(e); }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
(async function init(){
  const token=sessionStorage.getItem('tm50_token');
  const team=sessionStorage.getItem('tm50_team');
  const group=sessionStorage.getItem('tm50_group');
  if(token&&team){
    S.token=token; S.team=team; S.group=group; S.isAdmin=group==='ADMIN';
    try{ await enterApp(); }catch(e){ logout(); }
  }
})();
</script>
