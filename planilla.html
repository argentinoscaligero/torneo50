<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Planilla de Partido · Máster +50 2026</title>

  <style>
    :root {
      --primary: #004b8d;
      --secondary: #0085c7;
      --accent: #f9b000;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text: #222;
      --muted: #666;
      --radius-lg: 18px;
      --shadow-soft: 0 8px 24px rgba(0,0,0,0.06);
      --green: #2e7d32;
      --yellow: #f57f17;
      --red: #c62828;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    a{color:inherit;text-decoration:none}

    /* ── HEADER ── */
    header{background:var(--primary);color:#fff;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .header-left{display:flex;align-items:center;gap:.8rem}
    .header-left img{height:36px;border-radius:999px;background:#fff}
    .header-title{font-weight:800;font-size:.95rem}
    .header-sub{font-size:.78rem;opacity:.75}
    .header-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.35rem .85rem;border-radius:999px;cursor:pointer;font-size:.85rem;font-weight:700;transition:background .15s}
    .header-logout:hover{background:rgba(255,255,255,.25)}

    /* ── LAYOUT ── */
    main{max-width:960px;margin:0 auto;padding:1.5rem;padding-bottom:4rem}
    .section-title{font-size:1.25rem;font-weight:800;color:var(--primary);margin-bottom:.35rem}
    .section-sub{font-size:.88rem;color:var(--muted);margin-bottom:1.2rem}

    /* ── LOGIN SCREEN ── */
    #loginScreen{min-height:80vh;display:flex;align-items:center;justify-content:center}
    .login-card{background:#fff;border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow-soft);width:100%;max-width:400px}
    .login-card h2{color:var(--primary);font-size:1.2rem;margin-bottom:1.2rem}
    .field{display:grid;gap:.25rem;margin-bottom:.9rem}
    label{font-size:.82rem;font-weight:800;color:var(--primary)}
    input,select{width:100%;border-radius:12px;border:1px solid rgba(0,0,0,.1);padding:.6rem .8rem;font-size:.93rem;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff}
    input:focus,select:focus{border-color:rgba(0,133,199,.5);box-shadow:0 0 0 3px rgba(0,133,199,.13)}
    .btn{border:none;border-radius:999px;cursor:pointer;font-weight:700;transition:background .15s}
    .btn-primary{background:var(--primary);color:#fff;padding:.65rem 1.3rem;font-size:.93rem;box-shadow:0 4px 14px rgba(0,75,141,.25)}
    .btn-primary:hover{background:var(--secondary)}
    .btn-secondary{background:rgba(0,75,141,.07);color:var(--primary);padding:.6rem 1rem;font-size:.88rem}
    .btn-secondary:hover{background:rgba(0,75,141,.13)}
    .btn-sm{padding:.35rem .8rem;font-size:.82rem}
    .btn-danger{background:rgba(198,40,40,.08);color:var(--red);border:1px solid rgba(198,40,40,.2);padding:.35rem .75rem;border-radius:999px;cursor:pointer;font-size:.82rem;font-weight:700}
    .btn-danger:hover{background:rgba(198,40,40,.15)}
    .msg{margin-top:.7rem;padding:.6rem .9rem;border-radius:10px;font-size:.85rem;display:none}
    .msg.error{background:rgba(200,0,0,.07);color:#c00;border:1px solid rgba(200,0,0,.15);display:block}
    .msg.ok{background:rgba(0,160,70,.07);color:#006020;border:1px solid rgba(0,160,70,.15);display:block}
    .msg.warn{background:rgba(245,127,23,.1);color:#8a5000;border:1px solid rgba(245,127,23,.25);display:block}

    /* ── APP SCREEN ── */
    #appScreen{display:none}
    .welcome-banner{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border-radius:var(--radius-lg);padding:1.2rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .welcome-name{font-size:1.15rem;font-weight:800}
    .welcome-group{font-size:.85rem;opacity:.8;margin-top:.15rem}

    /* ── MATCH LIST ── */
    .match-list{display:grid;gap:.85rem}
    .match-item{background:#fff;border-radius:16px;padding:1rem 1.2rem;box-shadow:var(--shadow-soft);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .match-item:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.1)}
    .match-item.submitted{border-left:4px solid var(--green)}
    .match-item.pending{border-left:4px solid rgba(0,0,0,.1)}
    .match-teams-row{display:flex;align-items:center;gap:.6rem;font-weight:800;font-size:.95rem;color:var(--text)}
    .vs-badge{font-size:.75rem;color:var(--muted);background:rgba(0,0,0,.05);padding:.1rem .4rem;border-radius:999px}
    .match-meta-row{display:flex;flex-wrap:wrap;gap:.4rem;font-size:.78rem}
    .mp{background:rgba(0,75,141,.07);color:var(--primary);padding:.15rem .5rem;border-radius:999px;font-weight:700}
    .mp.sede{background:rgba(249,176,0,.15);color:#8a6000}
    .submitted-badge{font-size:.75rem;font-weight:800;color:var(--green);background:rgba(46,125,50,.1);padding:.2rem .55rem;border-radius:999px}
    .pending-badge{font-size:.75rem;font-weight:800;color:var(--muted);background:rgba(0,0,0,.05);padding:.2rem .55rem;border-radius:999px}
    .score-badge{font-weight:900;font-size:1.05rem;color:var(--primary);background:rgba(0,75,141,.07);padding:.2rem .6rem;border-radius:10px;min-width:56px;text-align:center}

    /* ── PLANILLA MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:1.5rem}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:22px;width:100%;max-width:720px;box-shadow:0 24px 60px rgba(0,0,0,.2);overflow:hidden;margin:auto}
    .modal-header{background:var(--primary);color:#fff;padding:1.1rem 1.4rem;display:flex;align-items:center;justify-content:space-between}
    .modal-header h3{font-size:1rem;font-weight:800}
    .modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:999px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .modal-body{padding:1.4rem}
    .modal-section{margin-bottom:1.4rem}
    .modal-section-title{font-size:.88rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.7rem;padding-bottom:.35rem;border-bottom:2px solid rgba(0,75,141,.1)}

    /* Resultado */
    .score-input-row{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
    .team-score-block{flex:1;min-width:120px;text-align:center}
    .team-score-label{font-size:.8rem;font-weight:800;color:var(--muted);margin-bottom:.4rem}
    .score-input{width:80px;font-size:2rem;font-weight:900;text-align:center;border-radius:14px;border:2px solid rgba(0,75,141,.2);padding:.3rem;color:var(--primary);display:block;margin:0 auto}
    .score-sep{font-size:1.8rem;font-weight:900;color:var(--muted);flex-shrink:0}
    .shootout-row{display:flex;align-items:center;gap:.7rem;margin-top:.6rem;flex-wrap:wrap}
    .shootout-label{font-size:.8rem;font-weight:700;color:var(--muted)}
    .shootout-input{width:55px;font-size:1.2rem;font-weight:800;text-align:center;border-radius:10px;border:1px solid rgba(0,0,0,.12);padding:.25rem;color:var(--primary)}

    /* Lineup */
    .lineup-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
    .lineup-col h4{font-size:.82rem;font-weight:800;color:var(--primary);margin-bottom:.5rem}
    .lineup-scroll{max-height:200px;overflow-y:auto;border:1px solid rgba(0,0,0,.07);border-radius:12px;padding:.4rem}
    .player-row{display:flex;align-items:center;gap:.5rem;padding:.3rem .4rem;border-radius:8px;cursor:pointer;font-size:.83rem;transition:background .12s}
    .player-row:hover{background:rgba(0,75,141,.05)}
    .player-row input[type="checkbox"]{accent-color:var(--primary);width:16px;height:16px;flex-shrink:0}
    .player-nro{min-width:28px;font-weight:800;color:var(--muted);font-size:.78rem}
    .player-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .player-titular{font-size:.72rem;background:rgba(0,75,141,.08);color:var(--primary);padding:.1rem .4rem;border-radius:999px;font-weight:700}

    /* Eventos */
    .event-list{display:grid;gap:.4rem;margin-bottom:.7rem;max-height:200px;overflow-y:auto}
    .event-item{display:flex;align-items:center;gap:.5rem;padding:.35rem .6rem;background:rgba(0,0,0,.025);border-radius:10px;font-size:.82rem}
    .event-icon{font-size:1rem;flex-shrink:0}
    .event-info{flex:1;min-width:0}
    .event-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:0 .2rem;flex-shrink:0}
    .event-del:hover{color:var(--red)}
    .add-event-form{display:grid;grid-template-columns:60px 1fr 1fr auto;gap:.5rem;align-items:end}
    .add-event-form label{font-size:.75rem;font-weight:800;color:var(--primary)}
    .add-event-form select,.add-event-form input{font-size:.82rem;border-radius:10px;border:1px solid rgba(0,0,0,.1);padding:.45rem .6rem}
    .add-event-form .btn{padding:.45rem .8rem;font-size:.82rem;white-space:nowrap}

    .modal-actions{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1.2rem;align-items:center}
    .warn-text{font-size:.8rem;color:var(--muted)}

    /* ── TABS ── */
    .tabs{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.2rem}
    .tab-btn{border:1px solid rgba(0,0,0,.08);background:#fff;color:var(--primary);font-weight:700;padding:.38rem .8rem;border-radius:999px;cursor:pointer;font-size:.85rem;box-shadow:var(--shadow-soft);transition:all .15s}
    .tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

    footer{text-align:center;font-size:.78rem;color:var(--muted);padding:1rem 1.5rem 2.5rem;border-top:1px solid rgba(0,0,0,.06);margin-top:2rem}
    @media(max-width:640px){
      main{padding:1rem}
      .add-event-form{grid-template-columns:55px 1fr}
      .lineup-grid{grid-template-columns:1fr}
    }
  </style>
</head>

      <a href="mailto:asociaciondehockey.ar@gmail.com" style="color:var(--secondary);font-weight:700">asociaciondehockey.ar@gmail.com</a>

  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
<main>

    <div>

  </div>

  <div class="tabs" id="fechaTabs"></div>

</main>
<footer>Campeonato Máster +50 Femenino 2026 · <a href="index.html">Volver al sitio →</a></footer>
</div>

//  AUTH

async function doLogin(){
  const team = document.getElementById('lTeam').value;
  const pass = document.getElementById('lPass').value;
  const msg  = document.getElementById('loginMsg');
  msg.className = 'msg';

  if(!team){ msg.className='msg error'; msg.textContent='Seleccioná tu equipo.'; return; }
  if(!pass){ msg.className='msg error'; msg.textContent='Ingresá la contraseña.'; return; }

  try {
    const res  = await fetch(API_BASE+'/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ team, password: pass })
    });
    const data = await res.json();
    if(res.ok && data.token){
      STATE.token   = data.token;
      STATE.team    = data.team;
      STATE.group   = data.group;
      STATE.isAdmin = data.group === 'ADMIN';
      sessionStorage.setItem('tm50_token', data.token);
      sessionStorage.setItem('tm50_team',  data.team);
      sessionStorage.setItem('tm50_group', data.group);
      await enterApp();
    } else {
      msg.className='msg error';
      msg.textContent = data.error || 'Usuario o contraseña incorrectos.';
    }
  } catch(e){
    msg.className='msg error';
    msg.textContent = '⚠️ No se puede conectar al servidor. Asegurate de que el backend esté corriendo: node backend/server.js';
  }
}

function logout(){
  sessionStorage.clear();
  STATE = { token:null, team:null, group:null, isAdmin:false, matches:{}, currentFecha:1, currentMatchId:null, planilla:{} };
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('lPass').value = '';
}

async function enterApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('headerTeamName').textContent = STATE.team;
  document.getElementById('welcomeName').textContent = STATE.isAdmin ? '👑 Administrador' : STATE.team;
  document.getElementById('welcomeGroup').textContent = STATE.isAdmin ? 'Acceso completo a todos los partidos' : `Grupo ${STATE.group}`;
  await loadMatches();
  renderFechaTabs();
  renderMatchList();
}

async function loadMatches(){
  try {
    const res  = await fetch(API_BASE+'/api/matches/full', { headers: { Authorization: 'Bearer ' + STATE.token } });
    STATE.matches = await res.json();
  } catch(e){
    console.error('Error cargando partidos', e);
  }
}

function renderFechaTabs(){
  const el = document.getElementById('fechaTabs');
  const fechas = [...new Set(Object.values(STATE.matches).map(m=>m.fecha))].sort();
  el.innerHTML = fechas.map(f => `
    <button class="tab-btn ${f===STATE.currentFecha?'active':''}" onclick="setFecha(${f},this)">Fecha ${f}</button>
  `).join('');
}

function setFecha(n, btn){
  STATE.currentFecha = n;
  document.querySelectorAll('#fechaTabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMatchList();
}

function renderMatchList(){
  const container = document.getElementById('matchListContainer');
  const items = Object.entries(STATE.matches)
    .filter(([,m]) => m.fecha === STATE.currentFecha)
    .sort(([,a],[,b]) => a.group.localeCompare(b.group) || (a.horario||'').localeCompare(b.horario||''));

  if(!items.length){
    container.innerHTML = '<p style="text-align:center;color:var(--muted);padding:2rem">No hay partidos para esta fecha.</p>';
    return;
  }

  container.innerHTML = '<div class="match-list">' + items.map(([id, m]) => {
    const isMyMatch = STATE.isAdmin || m.home === STATE.team || m.away === STATE.team;
    if(!isMyMatch) return '';
    const hasScore = m.scoreH !== null && m.scoreA !== null;

    return `
      <div class="match-item ${m.submitted?'submitted':'pending'}" onclick="openMatch('${id}')">
        <div>
          <div class="match-teams-row">
            ${m.home} <span class="vs-badge">vs</span> ${m.away}
          </div>
          <div class="match-meta-row" style="margin-top:.35rem">
            <span class="mp">Grupo ${m.group}</span>
            ${m.sede  ? `<span class="mp sede">📍 ${m.sede}</span>` : ''}
            ${m.horario?`<span class="mp">🕐 ${m.horario}</span>`  : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:.6rem">
          ${hasScore ? `<div class="score-badge">${m.scoreH} – ${m.scoreA}</div>` : ''}
          ${m.submitted
            ? `<span class="submitted-badge">✅ Enviada</span>`
            : `<span class="pending-badge">📝 Cargar</span>`}
        </div>
      </div>`;
  }).join('') + '</div>';
}

function openMatch(id){
  STATE.currentMatchId = id;
  const m = STATE.matches[id];
  // Inicializar planilla con datos existentes
  STATE.planilla = {
    scoreH:    m.scoreH,
    scoreA:    m.scoreA,
    shootoutH: m.shootoutH ?? null,
    shootoutA: m.shootoutA ?? null,
    lineup_home: m.lineup_home ? [...m.lineup_home] : [],
    lineup_away: m.lineup_away ? [...m.lineup_away] : [],
    events:    m.events ? [...m.events] : [],
  };
  document.getElementById('modalTitle').textContent = `${m.home} vs ${m.away} · Grupo ${m.group}`;
  renderModal();
  document.getElementById('planillaModal').classList.add('open');
}

function closeModal(){
  document.getElementById('planillaModal').classList.remove('open');
  STATE.currentMatchId = null;
}

function renderModal(){
  const id = STATE.currentMatchId;
  const m  = STATE.matches[id];
  const p  = STATE.planilla;
  const isSubmitted = m.submitted;

  const playersHome = PLAYERS[m.home] || [];
  const playersAway = PLAYERS[m.away] || [];

  // ── Resultado ──
  const resultHtml = `
    <div class="modal-section">
      <div class="modal-section-title">Resultado final</div>
      <div class="score-input-row">
        <div class="team-score-block">
          <div class="team-score-label">${m.home}</div>
          <input class="score-input" type="number" min="0" max="99" id="scoreH"
            value="${p.scoreH ?? ''}" onchange="p_setScore()" ${isSubmitted?'disabled':''} />
        </div>
        <div class="score-sep">–</div>
        <div class="team-score-block">
          <div class="team-score-label">${m.away}</div>
          <input class="score-input" type="number" min="0" max="99" id="scoreA"
            value="${p.scoreA ?? ''}" onchange="p_setScore()" ${isSubmitted?'disabled':''} />
        </div>
      </div>
      <div class="shootout-row">
        <span class="shootout-label">Shootouts:</span>
        <input class="shootout-input" type="number" min="0" max="10" id="shootH"
          placeholder="—" value="${p.shootoutH ?? ''}" onchange="p_setShootout()" ${isSubmitted?'disabled':''}/>
        <span class="shootout-label">–</span>
        <input class="shootout-input" type="number" min="0" max="10" id="shootA"
          placeholder="—" value="${p.shootoutA ?? ''}" onchange="p_setShootout()" ${isSubmitted?'disabled':''}/>
        <span class="shootout-label" style="font-size:.75rem">(solo si hubo)</span>
      </div>
    </div>`;

  // ── Formación ──
  function lineupCol(teamName, players, lineupArr, side){
    if(!players.length) return `<div><h4>${teamName}</h4><p class="warn-text">Planilla de inscripción no disponible</p></div>`;
    const rows = players.map((pl, i) => {
      const key = `${pl.nro}-${pl.apellido}`;
      const checked = lineupArr.includes(key) ? 'checked' : '';
      return `
        <div class="player-row">
          <input type="checkbox" data-key="${key}" data-side="${side}"
            ${checked} ${isSubmitted?'disabled':''}
            onchange="p_toggleLineup(this)" />
          <span class="player-nro">${pl.nro}</span>
          <span class="player-name">${pl.apellido}, ${pl.nombre}</span>
        </div>`;
    }).join('');
    const count = lineupArr.length;
    return `<div>
      <h4>${teamName} <span style="font-size:.75rem;color:var(--muted)">(${count} titulares)</span></h4>
      <div class="lineup-scroll">${rows}</div>
    </div>`;
  }

  const lineupHtml = `
    <div class="modal-section">
      <div class="modal-section-title">Formación inicial (titulares)</div>
      <div class="lineup-grid">
        ${lineupCol(m.home, playersHome, p.lineup_home, 'home')}
        ${lineupCol(m.away, playersAway, p.lineup_away, 'away')}
      </div>
    </div>`;

  // ── Eventos ──
  const eventIcons = { gol:'⚽', pc:'🔵', ps:'🟠', amarilla:'🟡', roja:'🔴', verde:'🟢' };
  const eventsListHtml = p.events.length
    ? p.events.map((ev, i) => `
        <div class="event-item">
          <span class="event-icon">${eventIcons[ev.type]||'❓'}</span>
          <div class="event-info">
            <strong>${ev.minuto}'</strong> · ${ev.team} · ${ev.player || 'Jugadora no especificada'}
          </div>
          ${!isSubmitted ? `<button class="event-del" onclick="p_delEvent(${i})">✕</button>` : ''}
        </div>`).join('')
    : `<div style="color:var(--muted);font-size:.83rem;padding:.4rem 0">Sin eventos registrados.</div>`;

  // Build player options for both teams
  const buildOpts = (teamName) => {
    const pl = PLAYERS[teamName] || [];
    return '<option value="">— Jugadora —</option>' +
      pl.map(p => `<option>${p.nro !== '—' ? '#'+p.nro+' ' : ''}${p.apellido} ${p.nombre}</option>`).join('') +
      '<option value="__otro__">Otra / sin número</option>';
  };

  const addEventHtml = !isSubmitted ? `
    <div class="add-event-form">
      <div>
        <label>Min.</label>
        <input type="number" id="evMin" min="1" max="60" placeholder="1" />
      </div>
      <div>
        <label>Tipo</label>
        <select id="evType">
          ${EVENT_TYPES.map(t=>`<option value="${t.value}">${t.label}</option>`).join('')}
        </select>
      </div>
      <div>
        <label>Equipo y jugadora</label>
        <select id="evTeamPlayer" style="width:100%">
          <optgroup label="${m.home}">${buildOpts(m.home).replace(/<option/g,'<option data-team="'+m.home+'"')}</optgroup>
          <optgroup label="${m.away}">${buildOpts(m.away).replace(/<option/g,'<option data-team="'+m.away+'"')}</optgroup>
        </select>
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn btn-primary btn-sm" onclick="p_addEvent()">+ Agregar</button>
      </div>
    </div>` : '';

  const eventsHtml = `
    <div class="modal-section">
      <div class="modal-section-title">Eventos del partido</div>
      <div class="event-list" id="eventList">${eventsListHtml}</div>
      ${addEventHtml}
    </div>`;

  // ── Acciones ──
  const actionsHtml = `
    <div class="modal-actions">
      ${!isSubmitted
        ? `<button class="btn btn-primary" onclick="submitPlanilla()">✅ Confirmar y enviar planilla</button>
           <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
           <span class="warn-text">Una vez enviada, la planilla queda registrada.</span>`
        : `<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
           <span class="warn-text" style="color:var(--green)">✅ Planilla enviada el ${m.submitted_at ? new Date(m.submitted_at).toLocaleString('es-AR') : '—'}</span>`
      }
    </div>`;

  const msgHtml = `<div id="planillaMsg" class="msg"></div>`;

  document.getElementById('modalBody').innerHTML =
    resultHtml + lineupHtml + eventsHtml + actionsHtml + msgHtml;
}

// ── Planilla helpers ──

function p_setScore(){
  const h = parseInt(document.getElementById('scoreH').value);
  const a = parseInt(document.getElementById('scoreA').value);
  STATE.planilla.scoreH = isNaN(h) ? null : h;
  STATE.planilla.scoreA = isNaN(a) ? null : a;
}

function p_setShootout(){
  const h = parseInt(document.getElementById('shootH').value);
  const a = parseInt(document.getElementById('shootA').value);
  STATE.planilla.shootoutH = isNaN(h) ? null : h;
  STATE.planilla.shootoutA = isNaN(a) ? null : a;
}

function p_toggleLineup(cb){
  const key  = cb.dataset.key;
  const side = cb.dataset.side;
  const arr  = side === 'home' ? STATE.planilla.lineup_home : STATE.planilla.lineup_away;
  if(cb.checked){ if(!arr.includes(key)) arr.push(key); }
  else { const i = arr.indexOf(key); if(i>-1) arr.splice(i,1); }
  // update count
  const m = STATE.matches[STATE.currentMatchId];
  const colEl = cb.closest('.lineup-scroll').parentElement.querySelector('h4 span');
  if(colEl) colEl.textContent = `(${arr.length} titulares)`;
}

function p_addEvent(){
  const min  = parseInt(document.getElementById('evMin').value);
  const type = document.getElementById('evType').value;
  const sel  = document.getElementById('evTeamPlayer');
  const opt  = sel.options[sel.selectedIndex];
  const team = opt.dataset?.team || opt.parentElement.label || '';
  const player = opt.value && opt.value !== '__otro__' ? opt.value : '';

  if(!min || min < 1 || min > 60){
    const msg = document.getElementById('planillaMsg');
    msg.className='msg warn'; msg.textContent='Ingresá un minuto válido (1–60).'; return;
  }
  STATE.planilla.events.push({ type, minuto: min, team, player });
  // re-sort by minute
  STATE.planilla.events.sort((a,b) => a.minuto - b.minuto);
  renderModal(); // re-render events
  // scroll to events
  document.getElementById('eventList').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function p_delEvent(i){
  STATE.planilla.events.splice(i, 1);
  renderModal();
}

async function submitPlanilla(){
  const p   = STATE.planilla;
  const msg = document.getElementById('planillaMsg');
  msg.className = 'msg';

  p_setScore();
  p_setShootout();

  if(p.scoreH === null || p.scoreA === null){
    msg.className='msg error'; msg.textContent='Ingresá el resultado final antes de enviar.'; return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/matches/${STATE.currentMatchId}/result`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', Authorization:'Bearer '+STATE.token },
      body: JSON.stringify({
        scoreH:     p.scoreH,
        scoreA:     p.scoreA,
        shootoutH:  p.shootoutH,
        shootoutA:  p.shootoutA,
        lineup_home: p.lineup_home,
        lineup_away: p.lineup_away,
        events:     p.events,
      })
    });
    const data = await res.json();
    if(res.ok && data.ok){
      STATE.matches[STATE.currentMatchId] = data.match;
      msg.className='msg ok'; msg.textContent='✅ Planilla enviada correctamente.';
      setTimeout(() => { closeModal(); renderMatchList(); }, 1800);
    } else {
      msg.className='msg error'; msg.textContent = data.error || 'Error al guardar la planilla.';
    }
  } catch(e){
    msg.className='msg error'; msg.textContent='Error de conexión con el servidor.';
  }
}

(async function init(){
  const token = sessionStorage.getItem('tm50_token');
  const team  = sessionStorage.getItem('tm50_team');
  const group = sessionStorage.getItem('tm50_group');
  if(token && team){
    STATE.token   = token;
    STATE.team    = team;
    STATE.group   = group;
    STATE.isAdmin = group === 'ADMIN';
    try {
      await enterApp();
    } catch(e){
      logout();
    }
  }
})();

document.getElementById('planillaModal').addEventListener('click', function(e){
